{% extends "base.html" %}

{% block title %}Регистрация | AVISHU{% endblock %}

{% block content %}
<section class="auth-card">
    <div>
        <p class="eyebrow">Новый пользователь</p>
        <h2>Создать аккаунт</h2>
        <p class="section-text">Роль определяет, в какой кабинет пользователь попадет после входа.</p>
    </div>

    <form method="post" class="stack-form">
        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="name@avishu.app" required>
        </label>

        <label>
            <span>Пароль</span>
            <input type="password" name="password" placeholder="Минимум 6 символов" required>
        </label>

        <label>
            <span>Роль</span>
            <select name="role" required>
                <option value="">Выберите роль</option>
                {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
        </label>

        <button type="submit" class="primary-btn">Зарегистрироваться</button>
    </form>
</section>
{% endblock %}
