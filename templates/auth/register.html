{% extends "base.html" %}

{% block title %}{{ t('register_title') }}{% endblock %}

{% block content %}
<section class="av-auth">
    <p class="av-kicker" style="font-size: 0.62rem; letter-spacing: 0.24em; color: #737373; margin-bottom: 1rem;">{{ t('auth_register_kicker') }}</p>
    <h2 class="av-h">{{ t('auth_register_heading') }}</h2>
    <p class="av-muted" style="margin-bottom: 2rem;">{{ t('auth_register_lead') }}</p>

    <form method="post" class="stack-form">
        <div class="av-field">
            <span>{{ t('field_email') }}</span>
            <input class="av-input" type="email" name="email" required autocomplete="email">
        </div>
        <div class="av-field">
            <span>{{ t('field_password') }}</span>
            <input class="av-input" type="password" name="password" required autocomplete="new-password">
        </div>
        <div class="av-field">
            <span>{{ t('field_role') }}</span>
            <select class="av-select" name="role" required>
                <option value="">{{ t('role_option_placeholder') }}</option>
                {% for role in roles %}
                <option value="{{ role }}">{{ label_role(role) }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="av-btn av-btn--inverse av-btn--block">{{ t('btn_create_account') }}</button>
    </form>
</section>
{% endblock %}
